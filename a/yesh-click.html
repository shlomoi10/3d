<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 250" width="100%" height="100%">
  <defs>
    <!-- גרדיאנטים לשכבות הלוגו -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007a" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    <linearGradient id="gradMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7928ca" />
      <stop offset="100%" stop-color="#ff007a" />
    </linearGradient>
    <linearGradient id="gradBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dfd8" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
  </defs>

  <style>
    /* ייבוא פונט Cairo המודרני מ-Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&amp;display=swap');

    .bg { fill: #0b0f19; rx: 16px; }

    /* אנימציית הריחוף של הלוגו */
    .s-structure {
      animation: floatS 4s ease-in-out infinite 1.8s;
    }

    .layer {
      stroke: #ffffff;
      stroke-width: 1px;
      stroke-opacity: 0.35;
    }
    .layer-top { fill: url(#gradTop); }
    .layer-mid { fill: url(#gradMid); }
    .layer-bot { fill: url(#gradBot); }

    .connector-wall {
      fill: #1e293b;
      fill-opacity: 0.55;
      stroke: #ffffff;
      stroke-width: 1px;
      stroke-opacity: 0.25;
    }

    /* הרכבת השכבות */
    .assemble-item {
      opacity: 0;
      transform-origin: 120px 185px;
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .delay-1 { animation-delay: 0.1s; } 
    .delay-2 { animation-delay: 0.3s; } 
    .delay-3 { animation-delay: 0.5s; } 
    .delay-4 { animation-delay: 0.7s; } 
    .delay-5 { animation-delay: 0.9s; } 

    .shadow {
      fill: #000000;
      fill-opacity: 0.6;
      filter: blur(8px);
      opacity: 0;
      transform-origin: 120px 210px;
      animation: shadowIntro 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 shadowScale 4s ease-in-out infinite 1.8s;
    }

    /* --- טיפוגרפיה והנפשות טקסט עם פונט Cairo --- */
    .brand-text {
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
    }

    /* כניסת המילה yesh והסאבטייטל */
    .title-yesh, .subtitle {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 1.2s forwards;
    }

    .title {
      font-weight: 900; /* עובי מודגש במיוחד של Cairo */
      font-size: 44px;
      fill: #ffffff;
    }

    .subtitle {
      font-weight: 600;
      font-size: 13px;
      fill: #818cf8;
      letter-spacing: 4px;
    }

    /* הופעת המילה click לאחר הקליק */
    .title-click {
      font-weight: 900;
      font-size: 44px;
      fill: #ff007a;
      opacity: 0;
      transform: scale(0.8);
      transform-origin: 110px -15px;
      animation: clickReveal 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 2.2s forwards;
    }

    /* --- הנפשת הסמן והקליק --- */
    
    /* תנועת העכבר המואטת */
    .cursor-group {
      opacity: 0;
      transform-origin: 0px 0px;
      animation: cursorAction 2.0s ease-in-out 1.3s forwards;
    }

    /* אפקט גל הלחיצה (Ripple) */
    .click-ripple {
      opacity: 0;
      fill: none;
      stroke: #ff007a;
      stroke-width: 2.5px;
      transform-origin: 110px -15px;
      animation: rippleEffect 0.5s ease-out 2.15s forwards;
    }

    /* --- הגדרות Keyframes --- */
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes clickReveal {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* תנועה איטית של העכבר למטרה */
    @keyframes cursorAction {
      0% {
        transform: translate(180px, 45px);
        opacity: 0;
      }
      40% {
        transform: translate(110px, -15px);
        opacity: 1;
      }
      44% {
        transform: translate(110px, -15px) scale(1);
      }
      48% {
        transform: translate(110px, -15px) scale(0.75);
      }
      52% {
        transform: translate(110px, -15px) scale(1);
      }
      78% {
        transform: translate(110px, -15px) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(130px, 20px) scale(1);
        opacity: 0;
      }
    }

    @keyframes rippleEffect {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: scale(4.5);
        opacity: 0;
      }
    }

    @keyframes assemble {
      0% {
        transform: translateY(100px) scaleY(0.4) scaleX(0.8);
        opacity: 0;
      }
      100% {
        transform: translateY(0) scaleY(1) scaleX(1);
        opacity: 1;
      }
    }

    @keyframes shadowIntro {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 0.6; }
    }

    @keyframes floatS {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes shadowScale {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(0.8); opacity: 0.3; }
    }
  </style>

  <!-- רקע כהה -->
  <rect width="100%" height="100%" class="bg" />

  <!-- צל הרצפה -->
  <ellipse cx="120" cy="210" rx="45" ry="12" class="shadow" />

  <!-- מבנה ה-S התלת-ממדי מונפש בהדרגה -->
  <g class="s-structure">
    <path d="M 120,145 L 175,165 L 120,185 L 65,165 Z" class="layer layer-bot assemble-item delay-1" />
    <path d="M 120,140 L 175,120 L 175,165 L 120,185 Z" class="connector-wall assemble-item delay-2" />
    <path d="M 120,100 L 175,120 L 120,140 L 65,120 Z" class="layer layer-mid assemble-item delay-3" />
    <path d="M 65,75 L 120,55 L 120,100 L 65,120 Z" class="connector-wall assemble-item delay-4" />
    <path d="M 120,55 L 175,75 L 120,95 L 65,75 Z" class="layer layer-top assemble-item delay-5" />
  </g>

  <!-- קבוצת טקסט לצד הלוגו -->
  <g transform="translate(235, 132)" class="brand-text">
    
    <!-- המילה yesh -->
    <text class="title title-yesh" x="0" y="0">yesh</text>
    
    <!-- המילה click (צמודה ללא רווח) -->
    <text class="title title-click" x="92" y="0">click</text>
    
    <!-- דומיין האתר החדש -->
    <text class="subtitle" x="3" y="26">yesh-click.com</text>

    <!-- גל אפקט הקליק -->
    <circle cx="110" cy="-15" r="5" class="click-ripple" />

    <!-- קבוצת סמן העכבר המונפש -->
    <g class="cursor-group">
      <path d="M 0,0 L 0,17 L 4.8,12.5 L 9,20 L 11.5,18.5 L 7.3,11.2 L 12.5,11.2 Z" 
            fill="#ffffff" 
            stroke="#0b0f19" 
            stroke-width="1.8" 
            stroke-linejoin="round" />
    </g>

  </g>
</svg>
