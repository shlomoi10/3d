<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 width="100%" viewBox="0 0 2804 880" style="background-color: #FFFFFF;" xml:space="preserve">

<style>
  /* ----- תנועת המרחב (דחיפת T ו-R) ----- */
  #group-t {
    transform: translateX(492px); /* מוצמד ל-M */
    animation: slideT 0.8s 4.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  
  #group-r {
    transform: translateX(-303px); /* מוצמד ל-M */
    animation: slideR 0.8s 4.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes slideT { to { transform: translateX(0); } }
  @keyframes slideR { to { transform: translateX(0); } }

  /* ----- הגדרות האותיות A (קו ישר שנפתח) ----- */
  #fake-a1 {
    transform: translateX(308px); /* מוצמד יחד עם ה-T */
    opacity: 0;
    animation: 
      popIn 0.2s 4.5s forwards,
      slideA1 0.8s 4.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
      hideFake 0.01s 5.6s forwards; /* נעלם כשהאנימציה מסתיימת */
  }

  #fake-a2 {
    transform: translateX(-308px); /* מוצמד יחד עם ה-R */
    opacity: 0;
    animation: 
      popIn 0.2s 4.5s forwards,
      slideA2 0.8s 4.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
      hideFake 0.01s 5.6s forwards;
  }

  .real-a {
    opacity: 0;
    animation: showReal 0.01s 5.6s forwards; /* האות המקורית המעוגלת מופיעה בדיוק כשהפתיחה מסתיימת */
  }

  @keyframes slideA1 { to { transform: translateX(0); } }
  @keyframes slideA2 { to { transform: translateX(0); } }
  @keyframes popIn { to { opacity: 1; } }
  @keyframes hideFake { to { opacity: 0; } }
  @keyframes showReal { to { opacity: 1; } }

  /* ----- הגדרות האנימציות הפנימיות ----- */
  #t-stick {
    transform-origin: 237px 618px; 
    animation: stickBounce 2.5s ease-in-out forwards;
  }
  
  #t-red {
    animation: redSquareAppear 2.5s ease-in-out forwards;
    opacity: 0; 
  }

  #t-roof {
    animation: roofMove 2.5s ease-in-out forwards;
  }

  #m-green {
    animation: mPullDown 2.5s 1.2s forwards;
  }

  #m-left-diag {
    transform-origin: 1144px 0px;
    animation: mStretch 2.5s 1.2s forwards;
  }

  #m-right-diag {
    transform-origin: 1571px 0px;
    animation: mStretch 2.5s 1.2s forwards;
  }

  #r-blue {
    transform-origin: 2522px 351px; 
    animation: blueRoll 2.2s 2.5s forwards; 
    opacity: 0;
  }

  /* ----- אנימציות T ----- */
  @keyframes roofMove {
    0%, 15% { transform: translateY(145px); } 
    25% { transform: translateY(165px); } 
    40% { transform: translateY(-12px); } 
    55% { transform: translateY(4px); } 
    70%, 100% { transform: translateY(0); } 
  }

  @keyframes stickBounce {
    0%, 15% { transform: scaleY(1); }
    25% { transform: scaleY(0.8); } 
    40% { transform: scaleY(1.05); } 
    55% { transform: scaleY(0.98); } 
    70%, 100% { transform: scaleY(1); }
  }

  @keyframes redSquareAppear {
    0%, 70% { opacity: 0; } 
    75%, 100% { opacity: 1; } 
  }

  /* ----- אנימציות M ----- */
  @keyframes mPullDown {
    0%, 5% { transform: translateY(0); }
    35% { transform: translateY(180px); animation-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1); } 
    45% { transform: translateY(-40px); } 
    60% { transform: translateY(15px); } 
    75% { transform: translateY(-5px); } 
    85% { transform: translateY(2px); } 
    100% { transform: translateY(0); } 
  }

  @keyframes mStretch {
    0%, 5% { transform: scaleY(1); }
    35% { transform: scaleY(1.42); animation-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1); } 
    45% { transform: scaleY(0.91); } 
    60% { transform: scaleY(1.035); } 
    75% { transform: scaleY(0.99); } 
    85% { transform: scaleY(1.01); } 
    100% { transform: scaleY(1); } 
  }

  /* ----- אנימציות R ----- */
  @keyframes blueRoll {
    0%, 5% { 
      transform: translate(140px, -180px) rotate(0deg); 
      opacity: 0; 
    }
    10% { 
      transform: translate(140px, -180px) rotate(0deg); 
      opacity: 1; 
      animation-timing-function: cubic-bezier(0.5, 0, 1, 0.5); 
    }
    40% { 
      transform: translate(100px, -30px) rotate(-150deg); 
      animation-timing-function: linear; 
    }
    60% { 
      transform: translate(25px, -2px) rotate(-270deg); 
      animation-timing-function: cubic-bezier(0.2, 0.5, 0.5, 1);
    }
    75% { 
      transform: translate(0px, 0px) rotate(-310deg); 
      animation-timing-function: cubic-bezier(0.2, 0.8, 0.4, 1); 
    }
    85% { 
      transform: translate(15px, -10px) rotate(-280deg); 
      animation-timing-function: cubic-bezier(0.4, 0, 0.8, 0.2); 
    }
    92% { 
      transform: translate(0px, 0px) rotate(-310deg); 
      animation-timing-function: cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    96% { 
      transform: translate(3px, -2px) rotate(-305deg); 
      animation-timing-function: cubic-bezier(0.4, 0, 0.8, 0.2);
    }
    100% { 
      transform: translate(0px, 0px) rotate(-310deg); 
      opacity: 1; 
    }
  }
</style>
