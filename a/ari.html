<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
    <defs>
        <!-- ייבוא פונטים -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');

            /* רקע כחול-צי יוקרתי */
            .bg-rect {
                fill: #0B1120;
            }

            /* רשת רקע */
            .grid-pattern {
                fill: url(#grid);
                opacity: 0;
                animation: fadeIn 2s ease-in-out 0.5s forwards;
            }

            /* תגיות קוד */
            .bracket {
                fill: none;
                stroke: url(#cyan-grad);
                stroke-width: 8;
                stroke-linecap: round;
                stroke-linejoin: round;
                stroke-dasharray: 120;
                stroke-dashoffset: 120;
                animation: draw 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
            }

            .slash {
                fill: none;
                stroke: #F8FAFC;
                stroke-width: 8;
                stroke-linecap: round;
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
                animation: draw 1s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
            }

            /* טקסט Ari */
            .text-ari {
                font-family: 'Inter', sans-serif;
                font-weight: 800;
                font-size: 82px;
                letter-spacing: -3px;
                fill: #F8FAFC;
                opacity: 0;
                transform: translateY(15px);
                animation: reveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
            }

            /* טקסט Dev */
            .text-dev {
                font-family: 'JetBrains Mono', monospace;
                font-weight: 400;
                font-size: 74px;
                letter-spacing: -2px;
                fill: url(#cyan-grad);
                opacity: 0;
                transform: translateY(15px);
                animation: reveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
            }

            /* 
               הכדור של ה-i שנופל מלמעלה.
               משך האנימציה 1.4 שניות לזרימה טבעית 
            */
            .i-dot {
                fill: #F8FAFC;
                opacity: 0;
                animation: dropBounce 1.4s linear 1.6s forwards;
            }

            /* סמן כתיבה */
            .cursor {
                font-family: 'JetBrains Mono', monospace;
                font-weight: 700;
                font-size: 80px;
                fill: #00E5FF;
                opacity: 0;
                animation: blink 1s step-end infinite;
                animation-delay: 3s; 
            }

            /* === מפתח אנימציות === */
            
            @keyframes draw {
                to { stroke-dashoffset: 0; }
            }

            @keyframes reveal {
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes fadeIn {
                to { opacity: 1; }
            }

            /* 
               פיזיקת כבידה מציאותית - כל פגיעה היא בדיוק באפס (translateY: 0),
               וכל קפיצה מאבדת גובה בהדרגה עד לעצירה מוחלטת וטבעית.
            */
            @keyframes dropBounce {
                0% { 
                    opacity: 0; 
                    transform: translateY(-70px); 
                    animation-timing-function: ease-in; /* תאוצה למטה (נפילה) */
                }
                15% { 
                    opacity: 1; 
                    transform: translateY(-70px); 
                    animation-timing-function: ease-in; 
                }
                42% { 
                    /* פגיעה ראשונה בדיוק באות */
                    transform: translateY(0); 
                    animation-timing-function: ease-out; /* האטה בעלייה */
                }
                56% { 
                    /* קפיצה גדולה למעלה */
                    transform: translateY(-18px); 
                    animation-timing-function: ease-in; 
                }
                69% { 
                    /* פגיעה שנייה */
                    transform: translateY(0); 
                    animation-timing-function: ease-out; 
                }
                78% { 
                    /* קפיצה בינונית */
                    transform: translateY(-6px); 
                    animation-timing-function: ease-in; 
                }
                86% { 
                    /* פגיעה שלישית */
                    transform: translateY(0); 
                    animation-timing-function: ease-out; 
                }
                91% { 
                    /* קפיצה קטנה */
                    transform: translateY(-2px); 
                    animation-timing-function: ease-in; 
                }
                96% { 
                    /* פגיעה רביעית */
                    transform: translateY(0); 
                    animation-timing-function: ease-out; 
                }
                98% { 
                    /* מיני-קפיצה אחרונה ובלתי מורגשת לריכוך העצירה */
                    transform: translateY(-0.5px); 
                    animation-timing-function: ease-in; 
                }
                100% { 
                    /* מנוחה מוחלטת */
                    opacity: 1; 
                    transform: translateY(0); 
                }
            }

            @keyframes blink {
                0%, 100% { opacity: 0; }
                50% { opacity: 1; }
            }
        </style>

        <!-- גרדיאנטים ופילטרים -->
        <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#0088FF" />
        </linearGradient>

        <!-- פילטר חלק ללא חיתוכים -->
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
        </pattern>
    </defs>

    <!-- רקעים -->
    <rect width="800" height="300" rx="20" class="bg-rect" />
    <rect width="800" height="300" rx="20" class="grid-pattern" />

    <!-- מעטפת מרכזית -->
    <g transform="translate(160, 150)">
        
        <!-- אייקון הקוד: < / > -->
        <g transform="translate(0, -40)">
            <path class="bracket" d="M 40,0 L 0,40 L 40,80" filter="url(#glow)"/>
            <path class="slash" d="M 65,85 L 95,-5" />
            <path class="bracket" d="M 120,0 L 160,40 L 120,80" filter="url(#glow)"/>
        </g>

        <!-- המילה Ari (ı ללא נקודה) -->
        <text x="195" y="25" class="text-ari">Arı</text>
        
        <!-- 
             הכדור - הונמך ל-cy="-33" 
             עכשיו הוא נח בדיוק על בסיס האות ונקודת הפגיעה זהה לנקודת המנוחה! 
        -->
        <circle cx="297" cy="-33" r="6.5" class="i-dot" filter="url(#glow)"/>

        <!-- המילה Dev -->
        <text x="325" y="25" class="text-dev">Dev</text>
        
        <!-- סמן כתיבה מפתח -->
        <text x="475" y="25" class="cursor">_</text>
        
    </g>
</svg>
