<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 250" width="100%" height="100%">
  <defs>
    <!-- גרדיאנטים לשכבות הלוגו -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007a" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    <linearGradient id="gradMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7928ca" />
      <stop offset="100%" stop-color="#ff007a" />
    </linearGradient>
    <linearGradient id="gradBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dfd8" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>

    <!-- מסיכת חיתוך: יוצרת חור בשוליים הימניים-תחתונים של העיגול (138,138) לקבלת מגרעת בשוליים -->
    <mask id="cursorHoleMask">
      <!-- שטח לבן = גלוי לחלוטין -->
      <rect x="-100" y="-100" width="800" height="800" fill="#ffffff" />
      <!-- שטח שחור = הופך לחור שקוף ומחסיר את הצורה בדיוק בשוליים -->
      <g transform="translate(138, 138)">
        <g class="mask-cursor">
          <path d="M 0,0 L 0,17 L 4.8,12.5 L 9,20 L 11.5,18.5 L 7.3,11.2 L 12.5,11.2 Z" 
                fill="#000000" 
                stroke="#000000" 
                stroke-width="1.8" 
                stroke-linejoin="round" />
        </g>
      </g>
    </mask>
  </defs>

  <style>
    /* ייבוא פונט Cairo מ-Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&amp;display=swap');

    .bg { fill: #0b0f19; rx: 16px; }

    /* קבוצת הלוגו מתחילה לרחף רק לאחר סיום כל האינטראקציות וההפיכה לעיגול (בשנייה 6.5) */
    .s-structure {
      animation: floatS 4s ease-in-out infinite 6.5s;
    }

    .layer {
      stroke: #ffffff;
      stroke-width: 1px;
      stroke-opacity: 0.35;
    }

    /* סנכרון אנימציות הלוגו */
    .layer-top { 
      fill: url(#gradTop); 
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards,
                 mergeTop 0.8s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }
    
    .layer-mid { 
      fill: url(#gradMid); 
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards,
                 mergeMid 3.3s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }

    /* עטיפת המסנן */
    .layer-mid-filter-container {
      animation: midFilterAnim 3.3s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }

    .layer-bot { 
      fill: url(#gradBot); 
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards,
                 mergeBot 0.8s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }

    .connector-wall-left {
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards,
                 mergeWallLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }
    .connector-wall-right {
      animation: assemble 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards,
                 mergeWallRight 0.8s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }

    .assemble-item {
      opacity: 0;
      transform-origin: 120px 185px;
    }

    /* הצל של הרצפה */
    .shadow {
      fill: #000000;
      fill-opacity: 0.6;
      filter: blur(8px);
      opacity: 0;
      transform-origin: 120px 210px;
      animation: shadowIntro 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 shadowMerge 1.0s cubic-bezier(0.25, 1, 0.5, 1) 3.2s forwards;
    }

    /* טיפוגרפיה */
    .brand-text {
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
    }

    .title-yesh, .subtitle {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 1.2s forwards;
    }

    .title {
      font-weight: 900;
      font-size: 44px;
      fill: #ffffff;
    }

    .subtitle {
      font-weight: 600;
      font-size: 13px;
      fill: #818cf8;
      letter-spacing: 4px;
    }

    .title-click {
      font-weight: 900;
      font-size: 44px;
      fill: #ff007a;
      opacity: 0;
      transform: scale(0.8);
      transform-origin: 110px -15px;
      animation: clickReveal 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 2.2s forwards;
    }

    /* סמני עכבר וגלי קליק */
    .cursor-group {
      opacity: 0;
      transform-origin: 0px 0px;
      animation: cursorAction 2.0s ease-in-out 1.3s forwards;
    }

    .click-ripple {
      opacity: 0;
      fill: none;
      stroke: #ff007a;
      stroke-width: 2.5px;
      transform-origin: 110px -15px;
      animation: rippleEffect 0.5s ease-out 2.15s forwards;
    }

    /* עכבר שני מגיע לשוליים גדול ובולט יותר (scale 1.2) */
    .cursor-group-2 {
      opacity: 0;
      transform-origin: 0px 0px;
      animation: cursorAction2 1.6s ease-in-out 4.6s forwards;
    }

    /* גל הקליק השני */
    .click-ripple-2 {
      opacity: 0;
      fill: none;
      stroke: #ff007a;
      stroke-width: 2.5px;
      transform-origin: 138px 138px;
      animation: rippleEffect2 0.5s ease-out 5.45s forwards;
    }

    /* מסיכת החיתוך הפנימית - מותאמת לגודל הלחיצה המכווץ החדש (scale 0.86) */
    .mask-cursor {
      opacity: 0;
      transform: scale(0);
      transform-origin: 0px 0px;
      animation: maskCursorAppear 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) 5.5s forwards;
    }

    /* --- הגדרות קיפריימס --- */
    
    @keyframes mergeTop {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(45px); opacity: 0; }
    }

    @keyframes mergeBot {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-45px); opacity: 0; }
    }

    /* הילה והשתקפות */
    @keyframes midFilterAnim {
      0% { filter: drop-shadow(0 0 0px rgba(255,0,122,0)); }
      12% { filter: drop-shadow(0 0 10px rgba(255, 0, 122, 0.75)); }
      30%, 70% { filter: drop-shadow(0 0 15px rgba(255, 0, 122, 0.85)); }
      85%, 100% { filter: drop-shadow(0 0 20px rgba(255, 0, 122, 0.95)); }
    }

    /* מעבר חלק במיוחד מהריבוע לעיגול (מורפינג רך בין 70% ל-92%) */
    @keyframes mergeMid {
      0% { 
        d: path("M 120,100 L 175,120 L 120,140 L 65,120 Z");
        fill: url(#gradMid); 
      }
      12% { 
        d: path("M 120,100 L 175,120 L 120,140 L 65,120 Z");
        fill: url(#gradTop); 
      }
      30%, 70% { 
        d: path("M 80,80 L 160,80 L 160,160 L 80,160 Z");
        fill: #ff007a; 
      }
      92%, 100% { 
        d: path("M 120,80 C 142,80 160,98 160,120 C 160,142 142,160 120,160 C 98,160 80,142 80,120 C 80,98 98,80 120,80 Z");
        fill: #ff007a; 
      }
    }

    @keyframes mergeWallLeft {
      0% { transform: translateY(0) scaleY(1); opacity: 1; }
      100% { transform: translateY(22.5px) scaleY(0); opacity: 0; }
    }

    @keyframes mergeWallRight {
      0% { transform: translateY(0) scaleY(1); opacity: 1; }
      100% { transform: translateY(-22.5px) scaleY(0); opacity: 0; }
    }

    @keyframes shadowMerge {
      0% { transform: scale(1); opacity: 0.6; }
      40% { transform: scale(0.82); opacity: 0.45; }
      100% { transform: scale(0.5); opacity: 0; }
    }

    /* העכבר השני מגיע בקנה מידה 1.2 ומבצע קליק ל-0.86 */
    @keyframes cursorAction2 {
      0% {
        transform: translate(170px, 180px) scale(0);
        opacity: 0;
      }
      35% {
        transform: translate(138px, 138px) scale(1.2); /* הגעה בגודל בולט */
        opacity: 1;
      }
      50% {
        transform: translate(138px, 138px) scale(1.2);
      }
      55% {
        transform: translate(138px, 138px) scale(0.86); /* לחיצה מכווצת */
        opacity: 1;
      }
      58%, 100% {
        transform: translate(138px, 138px) scale(0.86);
        opacity: 0;
      }
    }

    /* הופעת החיתוך (החור) במסכה בדיוק ברגע הלחיצה בשוליים (scale 0.86) */
    @keyframes maskCursorAppear {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(0.86); /* מותאם מושלם לקנה מידה של הלחיצה */
        opacity: 1;
      }
    }

    @keyframes rippleEffect2 {
      0% { transform: scale(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* קיפריימס בסיסיים */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes clickReveal {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes cursorAction {
      0% { transform: translate(180px, 45px); opacity: 0; }
      40% { transform: translate(110px, -15px); opacity: 1; }
      44% { transform: translate(110px, -15px) scale(1); }
      48% { transform: translate(110px, -15px) scale(0.75); }
      52% { transform: translate(110px, -15px) scale(1); }
      78% { transform: translate(110px, -15px) scale(1); opacity: 1; }
      100% { transform: translate(130px, 20px) scale(1); opacity: 0; }
    }

    @keyframes rippleEffect {
      0% { transform: scale(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    @keyframes assemble {
      0% { transform: translateY(100px) scaleY(0.4) scaleX(0.8); opacity: 0; }
      100% { transform: translateY(0) scaleY(1) scaleX(1); opacity: 1; }
    }

    @keyframes shadowIntro {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 0.6; }
    }

    @keyframes floatS {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>

  <!-- רקע כהה -->
  <rect width="100%" height="100%" class="bg" />

  <!-- קבוצת-על המקטינה את הלוגו ל-77% ומצמידה אותו קרוב ומיושר אנכית לחלוטין למרכז גוש הטקסט -->
  <g transform="translate(92, 38) scale(0.77)">
    <!-- צל הרצפה -->
    <ellipse cx="120" cy="210" rx="45" ry="12" class="shadow" />

    <!-- מבנה ה-S מונפש בהדרגה -->
    <g class="s-structure">
      <!-- 1. שכבה תחתונה -->
      <path d="M 120,145 L 175,165 L 120,185 L 65,165 Z" class="layer layer-bot assemble-item" />
      
      <!-- 2. קיר ימני קדמי -->
      <path d="M 120,140 L 175,120 L 175,165 L 120,185 Z" class="connector-wall connector-wall-right assemble-item" />
      
      <!-- 3. השכבה האמצעית (מקבלת מסיכת חיתוך פעילה) -->
      <g class="layer-mid-filter-container">
        <path d="M 120,100 L 175,120 L 120,140 L 65,120 Z" class="layer layer-mid assemble-item" mask="url(#cursorHoleMask)" />
      </g>
      
      <!-- 4. קיר שמאלי אחורי -->
      <path d="M 65,75 L 120,55 L 120,100 L 65,120 Z" class="connector-wall connector-wall-left assemble-item" />
      
      <!-- 5. שכבה עליונה -->
      <path d="M 120,55 L 175,75 L 120,95 L 65,75 Z" class="layer layer-top assemble-item" />

      <!-- גל אפקט הקליק השני ממוקם בשוליים (138, 138) -->
      <circle cx="138" cy="138" r="5" class="click-ripple-2" />

      <!-- קבוצת סמן העכבר השני החיצוני (גדול יותר ועקבי) -->
      <g class="cursor-group-2">
        <path d="M 0,0 L 0,17 L 4.8,12.5 L 9,20 L 11.5,18.5 L 7.3,11.2 L 12.5,11.2 Z" 
              fill="#ffffff" 
              stroke="#0b0f19" 
              stroke-width="1.8" 
              stroke-linejoin="round" />
      </g>
    </g>
  </g>

  <!-- קבוצת טקסט לצד הלוגו (ללא שינוי, מיושרת לחלוטין) -->
  <g transform="translate(235, 132)" class="brand-text">
    
    <!-- המילה yesh -->
    <text class="title title-yesh" x="0" y="0">yesh</text>
    
    <!-- המילה click (צמודה ללא רווח) -->
    <text class="title title-click" x="92" y="0">click</text>
    
    <!-- דומיין האתר -->
    <text class="subtitle" x="3" y="26">yesh-click.com</text>

    <!-- גל אפקט הקליק הראשון -->
    <circle cx="110" cy="-15" r="5" class="click-ripple" />

    <!-- קבוצת סמן העכבר הראשון -->
    <g class="cursor-group">
      <path d="M 0,0 L 0,17 L 4.8,12.5 L 9,20 L 11.5,18.5 L 7.3,11.2 L 12.5,11.2 Z" 
            fill="#ffffff" 
            stroke="#0b0f19" 
            stroke-width="1.8" 
            stroke-linejoin="round" />
    </g>

  </g>
</svg>
